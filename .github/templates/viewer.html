<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{WEEK}} - {{TITLE}} | {{COURSE_CODE}}</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Viewer-specific overrides */
    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      position: relative;
      flex-shrink: 0;
    }

    .header-content {
      padding: 0.75rem 1.5rem;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .week-badge {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      background: var(--accent);
      color: #000;
      padding: 0.25rem 0.625rem;
      border-radius: 4px;
    }

    .page-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
    }

    .download-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .download-btn:hover {
      background: var(--surface-2);
      border-color: var(--accent);
      color: var(--accent);
      text-decoration: none;
    }

    .pdf-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
    }

    .pdf-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #525659;
    }

    @media (max-width: 640px) {
      .header-content {
        flex-wrap: wrap;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
      }

      .header-center {
        order: 2;
        width: 100%;
        justify-content: center;
      }

      .header-nav {
        order: 1;
      }

      .download-btn {
        order: 3;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <nav class="header-nav">
        <a href="index.html" class="nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back
        </a>
      </nav>
      <div class="header-center">
        <span class="week-badge">{{WEEK}}</span>
        <span class="page-title">{{TITLE}}</span>
      </div>
      <a href="pdfs/{{FILENAME}}.pdf" download class="download-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download PDF
      </a>
    </div>
  </header>
  <div class="pdf-container">
    <iframe class="pdf-frame" src="pdfs/{{FILENAME}}.pdf" title="{{WEEK}} - {{TITLE}}"></iframe>
  </div>
</body>
</html>
